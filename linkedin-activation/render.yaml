services:
  - type: web
    name: linkedin-activation
    runtime: python
    rootDir: linkedin-activation
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LI_EMAIL
        sync: false
      - key: LI_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ATTIO_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_CHANNEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: cron
    rootDir: linkedin-activation
    name: linkedin-activation-cron
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 21,1,5,9 * * *"
    command: python -m app.pipeline
    envVars:
      - fromService:
          name: linkedin-activation
          type: web

  # Outreach pipeline cron jobs (hit FastAPI endpoints on the web service)
  # Detection: 9am + 5pm AEST weekdays (UTC: 23:00 Sun-Thu + 07:00 Mon-Fri)
  - type: cron
    name: outreach-detect
    runtime: python
    buildCommand: echo "no build needed"
    schedule: "0 23 * * 0-4"
    command: curl -s -X POST https://pulse-by-prefactor-1.onrender.com/jobs/detect-new-connections
    envVars: []

  - type: cron
    name: outreach-detect-afternoon
    runtime: python
    buildCommand: echo "no build needed"
    schedule: "0 7 * * 1-5"
    command: curl -s -X POST https://pulse-by-prefactor-1.onrender.com/jobs/detect-new-connections
    envVars: []

  # Draft: every 15 min
  - type: cron
    name: outreach-draft
    runtime: python
    buildCommand: echo "no build needed"
    schedule: "*/15 * * * *"
    command: curl -s -X POST https://pulse-by-prefactor-1.onrender.com/jobs/draft-outreach
    envVars: []

  # Send: every 30 min during business hours (9am-6pm AEST = 23:00-08:00 UTC)
  - type: cron
    name: outreach-send-evening
    runtime: python
    buildCommand: echo "no build needed"
    schedule: "*/30 23 * * 0-4"
    command: curl -s -X POST https://pulse-by-prefactor-1.onrender.com/jobs/launch-approved-sends
    envVars: []

  - type: cron
    name: outreach-send-morning
    runtime: python
    buildCommand: echo "no build needed"
    schedule: "*/30 0-8 * * 1-5"
    command: curl -s -X POST https://pulse-by-prefactor-1.onrender.com/jobs/launch-approved-sends
    envVars: []
