services:
  - type: web
    name: linkedin-activation
    runtime: python
    rootDir: linkedin-activation
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ATTIO_API_KEY
        sync: false
      - key: PHANTOMBUSTER_API_KEY
        sync: false
      - key: PB_CONNECTIONS_AGENT_ID
        sync: false
      - key: PB_MESSAGE_SENDER_AGENT_ID
        sync: false
      - key: PB_PROFILE_SCRAPER_ID
        sync: false
      - key: PB_ACTIVITY_EXTRACTOR_ID
        sync: false
      - key: PB_WEBHOOK_SECRET
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: OUTREACH_SLACK_CHANNEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DAILY_SEND_LIMIT
        sync: false
      - key: DRAFT_DAILY_LIMIT
        sync: false
      - key: DRAFT_BATCH_LIMIT
        sync: false
      - key: SEND_BATCH_LIMIT
        sync: false
      - key: SEND_LAUNCH_PAUSE_SECONDS
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false

  # Outreach pipeline cron jobs (hit the current FastAPI job endpoints on the web service)
  # APP_BASE_URL should be the public web URL without a trailing slash.
  # Detection: every 30 minutes, every day.
  - type: cron
    name: outreach-detect
    runtime: python
    buildCommand: echo "no build needed"
    schedule: "*/30 * * * *"
    command: 'curl -fsS -X POST "${APP_BASE_URL%/}/jobs/detect-new-connections"'
    envVars:
      - key: APP_BASE_URL
        sync: false

  # Draft + push to Slack: every 30 minutes, every day.
  - type: cron
    name: outreach-draft
    runtime: python
    buildCommand: echo "no build needed"
    schedule: "*/30 * * * *"
    command: 'curl -fsS -X POST "${APP_BASE_URL%/}/jobs/draft-outreach?limit=5"'
    envVars:
      - key: APP_BASE_URL
        sync: false

  # Send: every 30 minutes, every day.
  # The app enforces the per-run batch cap and daily max.
  - type: cron
    name: outreach-send
    runtime: python
    buildCommand: echo "no build needed"
    schedule: "*/30 * * * *"
    command: 'curl -fsS -X POST "${APP_BASE_URL%/}/jobs/launch-approved-sends?limit=5"'
    envVars:
      - key: APP_BASE_URL
        sync: false
