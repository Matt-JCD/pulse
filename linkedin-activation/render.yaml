services:
  - type: web
    name: linkedin-activation
    runtime: python
    rootDir: linkedin-activation
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LI_EMAIL
        sync: false
      - key: LI_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ATTIO_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_CHANNEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: cron
    rootDir: linkedin-activation
    name: linkedin-activation-cron
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 21,1,5,9 * * *"
    command: python -m app.pipeline
    envVars:
      - fromService:
          name: linkedin-activation
          type: web
